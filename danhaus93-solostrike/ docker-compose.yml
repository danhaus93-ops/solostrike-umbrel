version: "3.8"

services:

  # ── ckpool: Solo mining backend ──────────────────────────────────────────────
  ckpool:
    image: ghcr.io/danhaus93-ops/solostrike-ckpool:latest
    container_name: solostrike_ckpool
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/ckpool/config:/etc/ckpool
      - ${APP_DATA_DIR}/ckpool/logs:/var/log/ckpool
    networks:
      - default
      - bitcoin_network
    environment:
      - BITCOIN_RPC_HOST=${APP_BITCOIN_NODE_IP:-bitcoin_bitcoind_1}
      - BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT:-8332}
      - BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER:-umbrel}
      - BITCOIN_RPC_PASS=${APP_BITCOIN_RPC_PASS:-moneyprintergobrrr}

  # ── API: Log parser + REST + WebSocket ───────────────────────────────────────
  api:
    image: ghcr.io/danhaus93-ops/solostrike-api:latest
    container_name: solostrike_api
    restart: on-failure
    depends_on:
      - ckpool
    volumes:
      - ${APP_DATA_DIR}/ckpool/logs:/var/log/ckpool:ro
      - ${APP_DATA_DIR}/ckpool/config:/etc/ckpool
      - ${APP_DATA_DIR}/config:/app/config
    environment:
      - NODE_ENV=production
      - CKPOOL_LOG_DIR=/var/log/ckpool
      - CKPOOL_CONFIG_DIR=/etc/ckpool
      - CONFIG_DIR=/app/config
      - BITCOIN_RPC_HOST=${APP_BITCOIN_NODE_IP:-bitcoin_bitcoind_1}
      - BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT:-8332}
      - BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER:-umbrel}
      - BITCOIN_RPC_PASS=${APP_BITCOIN_RPC_PASS:-moneyprintergobrrr}
    networks:
      - default
      - bitcoin_network

  # ── UI: React dashboard served by nginx ─────────────────────────────────────
  ui:
    image: ghcr.io/danhaus93-ops/solostrike-ui:latest
    container_name: solostrike_ui
    restart: on-failure
    depends_on:
      - api
    ports:
      - "${APP_PORT}:80"
    networks:
      - default

networks:
  default:
    name: solostrike_default
  bitcoin_network:
    external: true
    name: bitcoin_default
