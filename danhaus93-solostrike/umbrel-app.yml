releaseNotes: >-
  V1.2.2 — Mature UI release.


  • Mobile-first responsive grid (1/2/4 cols), drag-and-drop card reordering with
  localStorage persistence

  • Compact AxeOS-style share display — raw counts with compact difficulty
  formatting ("2.79 G" instead of "2,790,000,000")

  • BTC price with 7-currency picker (USD / EUR / GBP / CAD / CHF / AUD / JPY)

  • Block reward shown in BTC + fiat equivalent, mempool fees in BTC

  • New Top Pool Finders leaderboard — last 20 network blocks aggregated

  • Expanded Bitcoin Network card with live mempool integration

  • Worker Grid now displays short worker names instead of full BTC addresses
