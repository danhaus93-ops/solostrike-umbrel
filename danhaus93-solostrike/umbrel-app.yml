id: danhaus93-solostrike
category: bitcoin
name: SoloStrike
version: "1.7.0"
tagline: Zero-fee solo Bitcoin mining pool with airgapped Private Mode
description: >-
  SoloStrike is a self-hosted solo Bitcoin mining pool for Umbrel, powered by
  the battle-tested ckpool-solo engine and wrapped in a real-time Deep Mine
  dashboard.


  Connect your ASICs directly to your own Bitcoin node and keep 100% of every
  block you find — no pool fees, no custody risk, no middleman.


  v1.3.0 introduces Private Mode — toggle one switch and the entire app goes
  airgapped. No mempool.space calls, no price feeds, no outbound traffic of
  any kind. Your mining activity is yours alone.


  Features:

  • 🔒 Private Mode — fully local operation, zero external API calls when enabled

  • 🌐 SoloStrike Network (v1.6.0) — opt-in anonymous community counter over nostr

  • Real-time hashrate waveform with 24h history, 7-day trends, axis labels, and peak tracking

  • Near Strikes leaderboard — historical top 10 best-diff shares across your fleet

  • Daily hashrate snapshots — 90 days of avg/peak history

  • Sticky header cluster — pool status, ticker, latest block, sync warnings, ZMQ indicator

  • Automatic miner-type detection (BitAxe Gamma/Supra/Ultra, NerdQaxe++, Antminer S19/S21 variants, Avalon Nano 3S / Avalon Q, Whatsminer, Braiins rentals)

  • Worker search, miner rename aliases, per-worker last-share timestamps

  • Click miner IP to open its web UI in a new tab

  • Worker offline toast notifications — catch outages the moment they happen

  • Bitcoin Core sync warning banner when your node falls behind

  • Bitcoin Node panel — Core version, total/in/out peers, relay fee, mempool size

  • Strike Odds — daily, weekly, and monthly block probability + expected time

  • Hot Streak gauge, difficulty retarget countdown, Claim Jumpers leaderboard

  • Latest Block hero strip — most recently mined block, pool, and reward

  • The Goldfields — recent network blocks feed with solo-winner highlighting

  • Block reward, BTC price (7 currencies), and mempool fees under Bitcoin Network

  • Drag-and-drop card reordering — layout persists per-device

  • Mobile-first responsive layout — 1 / 2 / 4 columns based on screen size

  • Top Diggers leaderboard — worker, miner type, hashrate, best diff, status

  • CSV export for workers and found blocks

  • Webhooks — POST events to Discord, ntfy.sh, Home Assistant, Telegram bots, etc.

  • Prometheus /metrics endpoint for Grafana, Home Assistant, and custom monitoring

  • Public read-only API — share your pool stats externally

  • Dual stratum ports — 3333 for ASICs, 3334 for hobby miners (BitAxe, NerdQaxe++)

  • ZMQ status indicator — see at a glance whether Bitcoin Core's block broadcasts are reaching the pool

  • Works with any Stratum V1 miner — one-time setup, miners connect automatically


  100% self-custody. Truly zero fees. Your node, your rules, your blocks.
releaseNotes: >-
  v1.6.0 — SoloStrike Network (backend). A new opt-in community counter
  lets your pool see and contribute to a live total of all SoloStrike
  pools running worldwide.


  HOW IT WORKS:

  Every install that opts in publishes a signed, anonymous event to three
  public nostr relays every 5 minutes. The payload is tiny: pool
  hashrate, worker count, app version, and total blocks found. Nothing
  else. No BTC address. No IP. No hostname. No location. Every install
  also subscribes to events from the last 15 minutes and aggregates the
  totals locally — so even installs that don't publish can still see
  the community's combined strength.


  PRIVACY MODEL:

  • Off by default. Publishing requires an explicit opt-in via
  /api/network-stats/enable.

  • A random nostr keypair is generated on first boot and stored only on
  your Umbrel. Not linked to your payout address or anything else.

  • You can regenerate the keypair anytime to reset your identity.

  • You can turn off publishing anytime. You'll still see network totals
  while observing.

  • Relays see your IP when you connect (same as any outbound Bitcoin
  service), but can't tie that IP to a person without out-of-band data.


  WHY NOSTR:

  Nostr is a decentralized messaging protocol with no central server.
  Free public relays carry the tiny signed events. No SoloStrike cloud
  infrastructure, no phone-home server. If one relay goes offline, two
  others carry the load.


  SPAM DEFENSE:

  • Any single install reporting over 10 PH/s or 1000 workers is
  rejected as bogus.

  • Events older than 15 minutes are rejected (prevents replay).

  • Same pubkey across multiple relays is deduped (counted once).


  BACKEND-FIRST ROLLOUT:

  This release ships the full backend — publisher, subscriber,
  aggregator, 4 new API endpoints (/api/network-stats,
  /api/network-stats/enable, /api/network-stats/disable,
  /api/network-stats/regenerate). UI surfaces are coming in v1.6.1 once
  the relay pipeline is verified in the wild.


  Advanced users can flip the toggle immediately via:
    curl -X POST http://<umbrel>:3001/api/network-stats/enable

  And verify events are publishing via:
    curl http://<umbrel>:3001/api/network-stats


  OTHER CHANGES:

  • savePersist now merges with existing persist.json instead of
  overwriting, so modules that save partial state (like the new
  network-stats module) don't need to carry around every other
  module's fields.

  • state.version is now exposed for use by modules that need to
  broadcast the running version.


  v1.5.13 — Recursive Sharelog Discovery + Gold-Rush Rebrand.


  CRITICAL FIX:

  • 🐛 SHARE COUNTS WERE MISSING ~97% OF SHARES. The share-watcher was only
  tracking 50 files out of 1,700+ on disk. ckpool creates a new subdirectory
  per block height (e.g. 000e708f, 000e7090, ...), but the watcher cached the
  first subdirectory found at startup and never re-scanned for new ones.
  Every time Bitcoin moved to a new block height, the pool's share activity
  became invisible to SoloStrike. Rewrote file discovery to recursively walk
  the entire log tree, re-scan every 15 seconds for new block-height
  directories, and removed the 50-file tracking cap. Ground-truth validation
  against the raw sharelog data now matches the Share Diagnostics modal
  exactly.


  GOLD-RUSH NAMING:

  The cards are now thematically named to match SoloStrike's combat +
  prospector vibe. Your hashrate is Firepower. Your miners are The Crew. You
  watch Near Strikes build toward Gold Strikes while Claim Jumpers keep
  finding blocks out in The Goldfields. The Hot Streak gauge tracks your luck
  and Strike Odds shows your block probability. Top Diggers leaderboard
  highlights your best-performing miners.


  UI:

  • Gold-amber titles on all themed cards (Firepower, The Crew, Strike Odds,
  Hot Streak, Top Diggers, Near Strikes, Gold Strikes, Claim Jumpers, The
  Goldfields). Utility cards (Bitcoin Network, Bitcoin Node, Difficulty
  Retarget, Share Stats) kept muted for visual hierarchy.

  • Block-found alert now reads "✦ GOLD STRUCK ✦".

  • Empty state on Gold Strikes card reads "No gold struck yet. Keep
  digging ⛏".


  v1.5.12 — Reset Button, UI Polish, Expanded CSV.


  NEW:

  • 🔄 RESET SESSION STATS — a new red button at the bottom of the Share
  Diagnostics modal lets you zero all per-worker share counts and start
  fresh. Confirms before wiping. After reset, only new shares from that
  moment forward are counted. Historical sharelog files on disk are never
  touched.


  • ⏱️ TRACKING SINCE TIMESTAMP — Share Diagnostics now shows exactly when
  the current session counts started accumulating, so you always know what
  window your stats cover.


  • 📊 EXPANDED CSV EXPORT — the workers.csv download now includes every
  share-diagnostic field: session accepted / rejected / stale, accept-rate
  percentage, per-worker best sdiff, last reject reason, full reject-reason
  breakdown, stratum port, worker alias, miner type/vendor, status, IP
  address, and all hashrate windows (1m/5m/1h/24h/7d). Plus a proper header
  row and correct MIME headers so browsers name the file as expected.


  UI POLISH:

  • 🔧 Fixed header text (ONLINE counter, PEAK hashrate, FLEET-WIDE label)
  overlapping with the drag-handle icon on the Pool Hashrate, Connected
  Workers, and Closest Calls cards.


  • 🧹 CSV download buttons are now clean icon-links instead of bordered
  boxes — lighter visual weight and better touch targets.


  FIXED:

  • 📥 CSV EXPORTS WERE RETURNING EMPTY FILES — the existing workers.csv,
  blocks.csv, and snapshots.csv endpoints passed array-of-objects to the
  CSV serializer, which only accepts array-of-arrays. All three endpoints
  rebuilt with proper header rows, correct value arrays, and
  content-disposition headers for sensible download filenames.


  v1.5.11 — Share Counter Accuracy (triple fix).


  FIXED:

  • 📊 MAIN SHARE STATS CARD displayed hashrate-work-weighted rejected
  counts (e.g. "11.28M rejected") instead of actual share counts
  (e.g. "0 rejected · 4 stale"). The status-poller was overwriting
  share-watcher's pool-level acceptedCount/rejectedCount/stale fields
  every 5 seconds with values from ckpool's pool.status file (which
  doesn't actually track share counts). The main card and the Share
  Diagnostics modal now agree — both show the same real share numbers.


  • 💾 SHARELOG CURSORS PERSISTENCE — share-watcher previously skipped to
  end-of-file every time it discovered a sharelog, losing all historical
  shares silently on every API restart. Now persists the byte-offset for
  every sharelog to persist.json and resumes reading from the correct
  position after restart. New files read from byte 0. Previously-tracked
  files resume from the saved offset. No double-counting, no silent
  skipping.


  • ➕ POOL-LEVEL COUNTERS — share-watcher now populates state.shares
  acceptedCount and rejectedCount in real time (in addition to stale,
  which already worked). Previously these fields were initialized to 0
  and never incremented, which is why the UI main card fell back to
  showing the work-weighted numbers from pool.status.


  UNDER THE HOOD:

  • share-watcher.js: sharelogCursors persisted alongside shareCounters,
  resumes from saved byte offsets on startup, falls back to byte 0 for
  newly-discovered files (which prevents re-counting since counters are
  also persisted), increments pool-level counters in live processShare.


  • status-poller.js: deleted three lines that overwrote share-watcher's
  counters every 5 seconds. Only work-weighted accepted/rejected from
  ckpool's pool.status are touched by status-poller now.


  v1.5.10 — Share Diagnostics Visibility (bundled into v1.5.9).


  Quiet polish pass, no separate release: tap-for-diagnostics affordance on
  the Share Stats card, zero-rejected/zero-stale rows hidden in the
  Per-Worker Health breakdown to reduce visual noise when everything's
  working.


  v1.5.9 — Per-Worker Share Diagnostics.


  Pool-wide and per-worker tracking of every share submitted — accepted,
  rejected, and stale — with full reject-reason breakdowns. Tap the Share
  Stats card to open a new Share Diagnostics modal, or tap any worker row
  to see that worker's individual reject history.
