manifestVersion: 1
id: danhaus93-solostrike
category: bitcoin
name: SoloStrike
version: "1.8.1"
tagline: Zero-fee solo Bitcoin mining pool with airgapped Private Mode
description: >-
  SoloStrike is a self-hosted solo Bitcoin mining pool for Umbrel, powered by
  the battle-tested ckpool-solo engine and wrapped in a real-time Deep Mine
  dashboard.


  Connect your ASICs directly to your own Bitcoin node and keep 100% of every
  block you find — no pool fees, no custody risk, no middleman.


  v1.3.0 introduces Private Mode — toggle one switch and the entire app goes
  airgapped. No mempool.space calls, no price feeds, no outbound traffic of
  any kind. Your mining activity is yours alone.


  Features:

  • 🔒 Private Mode — fully local operation, zero external API calls when enabled

  • 🌐 SoloStrike Pulse (v1.6.0+) — opt-in anonymous community counter over nostr, with per-peer Strikers roster (v1.7.5)

  • 🛡️ Tor routing for Pulse (v1.7.3) — broadcasts and subscriptions optionally route through Umbrel's tor_proxy

  • ⚡ The Vein (v1.7.6) — block reward + fee tiers + statistical earnings + odds, all in one tap-to-drill card

  • 🎯 The Reckoning (v1.7.5) — strike forecast simulator with hashrate slider, probability waterfall, and global network rank

  • 🔥 The Burn (v1.7.7) — power cost integration: net profit per strike + break-even electricity rate

  • ⚙ Stratum Connection card (v1.7.6) — copy-button setup for ASIC / hobby / SSL ports with live port status

  • Real-time hashrate waveform with 24h history, 7-day trends, axis labels, and peak tracking

  • Near Strikes leaderboard — historical top 10 best-diff shares across your fleet

  • Daily hashrate snapshots — 90 days of avg/peak history

  • Sticky header cluster — pool status, ticker, latest block, sync warnings, ZMQ indicator

  • Automatic miner-type detection (BitAxe Gamma/Supra/Ultra, NerdQaxe++, Antminer S19/S21 variants, Avalon Nano 3S / Avalon Q, Whatsminer, Braiins rentals)

  • Worker search, miner rename aliases, per-worker last-share timestamps

  • Click miner IP to open its web UI in a new tab

  • Worker offline toast notifications — catch outages the moment they happen

  • Bitcoin Core sync warning banner when your node falls behind

  • Bitcoin Node panel — Core version, total/in/out peers, relay fee, mempool size

  • Strike Odds — daily, weekly, and monthly block probability + expected time

  • Hot Streak gauge, difficulty retarget countdown, Claim Jumpers leaderboard

  • Latest Block hero strip — most recently mined block, pool, and reward

  • The Goldfields — recent network blocks feed with solo-winner highlighting

  • Block reward, BTC price (7 currencies), and mempool fees under Bitcoin Network

  • Drag-and-drop card reordering — layout persists per-device

  • Mobile-first responsive layout — 1 / 2 / 4 columns based on screen size

  • Top Diggers leaderboard — worker, miner type, hashrate, best diff, status

  • CSV export for workers and found blocks

  • Webhooks — POST events to Discord, ntfy.sh, Home Assistant, Telegram bots, etc.

  • Prometheus /metrics endpoint for Grafana, Home Assistant, and custom monitoring

  • Public read-only API — share your pool stats externally

  • Dual stratum ports — 3333 for ASICs, 3334 for hobby miners (BitAxe, NerdQaxe++)

  • ZMQ status indicator — see at a glance whether Bitcoin Core's block broadcasts are reaching the pool

  • Works with any Stratum V1 miner — one-time setup, miners connect automatically


  100% self-custody. Truly zero fees. Your node, your rules, your blocks.
releaseNotes: >-
  v1.8.0 — The Hunt release.


  RENAMED & REDESIGNED


  • The Vein → "The Hunt" — bigger Bitcoin-native rebrand, with a brand-new
    NONCE FIELD visualization replacing the gold-quartz SVG. A 32×6 grid of
    dim points represents the 2³² nonce space your fleet is searching;
    cells flicker amber as you hash, a vertical scan line sweeps L→R
    representing nonce iteration, and bright strike flashes mark "winner"
    cells. Mining-accurate where the old Vein was just decorative.


  • The Goldfields → "The Ledger"


  • Gold Strikes → "Solo Strikes"


  • Block-found alert: "STRIKE!" → "BLOCK STRUCK!"


  NEW CARDS & VISUALIZATIONS


  • STRIKE VELOCITY — new chart card visualizing share submission rate
    over time as a vertical-bar histogram. Each bar = 1 minute; bars are
    color-coded green (normal), amber (anomalous high or low — vardiff
    bump or partial outage), red (zero — full downtime). Distinct from
    Firepower's line chart at a glance. 1H / 6H / 24H range buttons.


  • HASHRATE AVERAGES strip below the Firepower chart — seven rolling
    windows (1M / 5M / 15M / 1H / 6H / 24H / 7D) shown as horizontal bars.
    Each label is also a chart-range button, replacing the old top-right
    button row.


  REAL DATA REPLACING ESTIMATES


  • Real shares-per-minute on Share Stats from ckpool's sps1m field.


  • Reject Rate top-line tile + Lifetime Shares counter on Share Stats.


  • Block weight + transaction count on the latest block.


  • Bitcoin Core subversion string on the Bitcoin Node card.


  • Pool Uptime + Started date tiles on the Stratum card.


  • Last epoch comparison on the Difficulty Retarget card.


  • Per-block odds now display as "1 in 10.4M" instead of "7.7e-6%".


  DIAGNOSTICS MODAL — 4 NEW LINES


  • Avg Share Difficulty (acceptedDiff / count)


  • Last Share (pool-level), color-coded by recency


  • Implied Hashrate from share submissions, with ✓/⚠ vs live hashrate


  • Session Started timestamp + duration


  CONDENSED & POLISHED


  • Stratum card — three "tap to edit" labels removed, helpers folded
    into placeholders, padding tightened. Now fits one screen on iPhone.


  • The Crew — worker filter search bar removed (overkill for 12-15 solo
    workers).


  • 100% SOLO stamp moved up so it's no longer clipped at card bottom.


  • Pulse canvas now fills its full 160px container instead of being
    locked to 96px (empty band at the bottom of all 5 animations gone).


  FIVE BUGS FIXED


  • The Hunt "Fees" no longer always shows +0.0000.


  • Worker rejected counter now properly decreases when ckpool reports 0.


  • parseHashrate is case-insensitive now (defensive).


  • CSV exports use proper RFC-4180 quoting (worker names with commas
    don't shift columns).


  • state.blockReward init shape aligned with writer.


  ---


  v1.7.22 — Jumpers Combo + Color Restore + Layout Fixes.


  COLOR SCHEME RESTORED

  The original warm amber palette is back. The v1.7.x rewrite had
  silently dropped several CSS variables (--btc-orange, --bg-surface,
  --bg-void, --amber-hot, --glow-a), which made the Latest Block icon
  render white and shifted the whole UI to a colder, darker neutral
  look. Restored from the original v1.5.9 palette:

  • BTC orange icon back on Latest Block
  • Chakra Petch display font (the angular tech face)
  • Warm cream text (#EAD9C0) instead of cool gray
  • Subtle amber radial glow at top of viewport
  • Amber-tinted scrollbar


  NEW: CLAIM JUMPERS + GOLD STRIKES COMBINED CARD

  Two cards merged into one. Claim Jumpers (top — pool find leaderboard)
  with Gold Strikes (bottom — your own found blocks) in a single card.
  Section names preserved. Existing layouts auto-migrate.


  LAYOUT FIXES

  • Header no longer scrolls away. Replaced position:sticky (which fails
    on iOS Safari/PWA) with a proper flex column app shell. Header and
    footer now lock to top/bottom regardless of carousel scroll.

  • The Vein "Tap for the Reckoning" footer no longer clipped. Cards
    now use natural height and the carousel slot scrolls when needed.

  • The Crew + Near Strikes scroll properly inside their slot.

  • Goldfields list shows more network winners before scrolling.


  NEW: HASHPULSE CARD

  Firepower (live hashrate) and SoloStrike Pulse (network census) are
  now combined into one card called HashPulse. Both sections preserve
  their original names and visual style — just shrunk to fit together
  in one carousel slot without scrolling.

  Layout:
  - FIREPOWER — LIVE on top: big TH/s number, peak, 1H/6H/24H/7D
    range buttons, hashrate chart (compact at ~90px tall)
  - Subtle amber gradient divider
  - SOLOSTRIKE PULSE below: heartbeat waveform (compact at 64px),
    3 stat tiles (Pools / Hashrate / Miners), 100% SOLO stamp,
    "Tap Strikers" footer

  Migration: existing users with old `hashrate` and `pulse` cards
  in their layout will auto-migrate to the new `hashpulse` card on
  first load. No layout reset needed.


  ALSO IN THIS RELEASE (carried from v1.7.19):

  • Card sizing fix — short cards no longer stretch into giant boxes,
    long cards scroll internally
  • Settings → Display → Card Layout (Mobile) toggle:
    Carousel · Swipe (default) or Vertical · Scroll


  v1.7.18 — Carousel Hotfix.


  v1.7.17 — Mobile Card Carousel.


  FIXED: CARD SIZING

  Short cards (Latest Block, Network, Best Diff) no longer stretch into
  giant boxes with wasted black space. They now sit at their natural
  height in the carousel slot, with the page background visible below.

  Long cards (The Crew, Stratum, Goldfields) now scroll INSIDE their
  slot when content is taller than the viewport. The slot itself stays
  fixed; only the inner content moves.


  NEW: LAYOUT TOGGLE

  Settings → Display now has a "Card Layout (Mobile)" toggle:

  • CAROUSEL · SWIPE (default) — one card per screen, swipe between them
  • VERTICAL · SCROLL — classic stack, scroll up/down on one page
    (same as it was before v1.7.17)

  Toggle takes effect immediately, no reload. Per-device preference,
  stored in localStorage. Desktop (≥768px) always uses the multi-column
  grid regardless of this setting.


  v1.7.18 — Carousel Hotfix (never officially released).


  v1.7.17 — Mobile Card Carousel.


  NEW: SWIPE BETWEEN CARDS

  On mobile (under 768px wide), SoloStrike is now a swipeable carousel.
  Each card fills the full viewport between the sticky header and sticky
  footer. Swipe left/right to move between cards. CSS scroll-snap keeps
  each card centered, no library, native iOS Safari smoothness.


  POSITION DOTS:

  A small floating indicator at the bottom of the carousel shows which
  card you're on (out of how many). Tap any dot to jump straight to that
  card. The active dot is amber and stretches into a small bar; inactive
  dots are gray.


  STRATUM CARD AUTO-ROTATION:

  First-time users see the Stratum card FIRST in the carousel — it's the
  setup form. As soon as you configure both your HOST and your
  WORKERNAME (in the Stratum card itself), the app rotates Stratum to
  the END of the carousel and remembers that you're set up.

  After that you'll never need to look at it daily — you'll start in
  the cards that matter (Vein, Firepower, Pulse, etc) and only swipe
  to Stratum when you add a new rig. The rotation only happens ONCE,
  so future drag-to-reorder (coming in v1.7.18) won't be overridden.


  DESKTOP UNCHANGED:

  At 768px+, the layout stays as it is now — multi-column grid, all
  cards visible at once. No carousel, no dots. Same components, two
  layouts based on viewport. Resize your browser to see the switch.


  TECHNICAL:

  - Pure CSS scroll-snap-type: x mandatory — zero new dependencies
  - Each card is height: 100% of carousel area, with internal scroll
    if its content overflows (Crew, Goldfields, etc)
  - useIsMobile() React hook listens to media query changes for
    instant layout switch on rotate / window resize
  - Stratum first-then-rotate state stored in localStorage so the
    decision persists across sessions


  v1.7.16 — Editable Stratum Settings.


  NEW: STRATUM CARD IS NOW THE SETTINGS HUB

  The Stratum card has been reimagined as your one-stop config for
  miner connection details. Three editable fields, tap any to start
  typing:

  • HOST — what the miner connects to (default: umbrel.local)
    Examples: umbrel.local · 192.168.1.42 · my-rig.local

  • WORKERNAME — suffix that becomes part of your USER string
    Examples: bitaxe-01 · s19xp · nano3s_1

  • PASS / DIFFICULTY — usually 'x' for vardiff, or 'd=10000' to
    lock to a specific difficulty
    Examples: x · d=10000 · d=1M


  WHY THIS MATTERS:

  Previously, stratum URLs used whatever URL you typed to access
  SoloStrike — which leaked things like Tailscale IPs into URLs you
  copied for OTHER people's miners. Now the host is yours to set
  and shared across all stratum URL displays:

  • Footer port indicators (3333 / 3334 / 🔒 4333) — tap to copy
  • Three port chips inside the Stratum card — tap to copy
  • Worker detail modal copy buttons — same configured host

  All read from the same value. Configure it once, copy from
  anywhere.


  PORT CHIPS WITH LIVE STATUS:

  The three port chips below the HOST field show real-time port
  status (open/degraded/down) and double as copy buttons. Tap any
  chip to copy stratum+tcp://host:port (or stratum+ssl:// for the
  🔒 4333 chip).


  SETTINGS PERSIST:

  All three fields save to localStorage on blur (when you tap
  outside the field). Per-device settings — each device you install
  the SoloStrike PWA on has its own configuration. This is
  intentional — different testers might use different hosts.


  v1.7.15 — Sticky Footer & Update Banner Cleanup.


  NEW: STICKY FOOTER

  The footer (SOLOSTRIKE V[ver] — CKPOOL-SOLO · GitHub · PORTS) now stays
  pinned to the bottom of the viewport while you scroll through cards.
  Same backdrop-blur treatment as the sticky header — your two persistent
  zones at top and bottom, with the dashboard scrolling between them.

  This is groundwork for the v1.8.0 mobile redesign. Top and bottom stay
  glued; the middle becomes the swipeable card area.


  CLEANUP: REMOVED SOFT-UPDATE BANNER PATH

  The service-worker-triggered "tap to update" banner was unreliable in
  iOS PWA mode — the SW would silently update on app close/reopen before
  the banner had a chance to render. Removed the SW polling and event
  dispatch infrastructure to keep the codebase clean.

  What stays:

  - The hard-update banner (cyan wrench) for breaking infrastructure
    changes — driven by composeVersion mismatch in API state, fires
    immediately when the page loads, no SW timing involved
  - Service worker still caches the app shell for offline / instant load
  - Cache name still bumps per release (sw.js) to invalidate stale shells

  What's gone:

  - The soft "tap to update" amber lightning-bolt banner
  - SW update polling in index.html
  - sw:update-available event dispatch + listener
  - SKIP_WAITING message handler in sw.js

  iOS PWAs will now pick up new versions on cold launch — close + reopen
  is enough. For a more deterministic update experience, install from
  Umbrel's app store when prompted.


  v1.7.12 — Watchful Banners & Tappable Ports.


  NEW: WORKER OFFLINE BANNERS

  When a worker drops offline (no shares for >5 minutes), a persistent
  amber banner appears at the top of the app. Stays visible until you
  tap × to dismiss, OR until the worker comes back online — at which
  point it flashes a green ✓ BACK ONLINE confirmation that fades after
  5 seconds.

  Multiple workers offline? They collapse into a single banner with a
  count: "3 WORKERS OFFLINE". Tap the chevron to expand and see which
  ones, when each was last seen, and dismiss individually.


  NEW: HASHRATE TREND ARROW

  Next to your live hashrate in the Firepower card, you'll see a small
  ▲ or ▼ with a percentage when your hashrate is trending up or down
  vs. 5 minutes ago. Green ▲ for up, red ▼ for down. Hidden when the
  change is under 1% so it doesn't flicker on noise.

  Quick glance at your phone: solid green ▲ = rigs ramping up. Red ▼ =
  something needs attention. The arrow doesn't pulse or animate — it's
  meant to be ambient signal, not interruption.


  NEW: TAPPABLE FOOTER PORTS

  Tap any port number in the bottom footer (3333 / 3334 / 🔒4333) to
  copy the full stratum URL to your clipboard. Paste it directly into
  any miner's pool config field. The locked port copies the SSL form
  (stratum+ssl://) for ASICs with TLS support.

  A small ✓ COPIED tooltip flashes above the port for 1.8 seconds so
  you know it worked.


  WHAT THIS PROVES:

  This is the first release that ships THROUGH the v1.7.11 update banner
  itself. If your iPhone PWA is running v1.7.11, you should see an amber
  ⚡ banner appear at the top of the app within a minute of this version
  going live. Tap it. App reloads. You're on v1.7.12.

  Welcome to self-updating SoloStrike.


  v1.7.11 — Self-Updating Banner.


  NEW: SOLOSTRIKE TELLS YOU WHEN UPDATES ARE READY

  No more checking Umbrel to see if a new version dropped. SoloStrike
  now shows a banner inside the app the moment a new version is
  available — and lets you apply it with one tap.


  TWO BANNER TIERS:

  ⚡ SOFT UPDATE (amber)
     UI/code changes only. Tap the banner and the app reloads with
     the new version. Takes about 2 seconds. No Umbrel trip needed.

  🔧 INFRASTRUCTURE UPDATE (cyan)
     For releases that change the underlying app config (new env vars,
     compose changes, new containers). Banner explains what to do —
     open Umbrel App Store, find SoloStrike, tap Update. Mining keeps
     hashing through the update.


  EXPANDABLE RELEASE NOTES:

  Tap the chevron on any banner to see what's actually in the update
  — what's new, what's fixed, what changed. Pulled live from the API
  so you always see the latest notes without any external lookup.


  DISMISSIBLE:

  Tap the × to dismiss a banner until the next version drops. The app
  remembers your choice in localStorage. Critical security/mining-
  affecting updates can't be dismissed (this is a feature, not a bug).


  TECHNICAL FOUNDATION:

  - composeVersion field added to API state — bumps only when manifest
    or compose actually changes, so the UI knows soft vs hard
  - urgency field added (normal | recommended | critical) — drives
    banner styling, set per release
  - Service worker dispatches sw:update-available event when new
    bundle ready, banner listens and offers reload
  - All custom inline SVGs in your amber/cyan palette — no extra deps


  This is the foundation for self-managing SoloStrike installs. Future
  releases will ship to your phone and announce themselves in the app
  itself. Open Umbrel only when you actually need to.


  v1.7.10 — Progressive Web App.


  NEW: INSTALL TO HOME SCREEN

  SoloStrike is now a real Progressive Web App. On iPhone, tap Share →
  Add to Home Screen and SoloStrike installs as a real app icon. Launch
  it directly from your home screen and it opens fullscreen — no Safari
  URL bar, no tabs, no browser chrome. Pure mining dashboard.


  WHAT YOU GET WITH PWA:

  - Real app icon on iPhone home screen, not a Safari bookmark

  - Full-screen launch — no browser chrome eating screen space

  - Faster perceived load times — the app shell caches locally via
    a service worker

  - Offline shell — if your Umbrel reboots or network drops, the UI
    still loads instead of blanking to white. Live data resumes the
    moment connectivity returns.

  - App switcher integration — SoloStrike gets its own card in iOS
    multitasking, separate from Safari


  HOW TO INSTALL ON IPHONE:

  1. Open SoloStrike in Safari on your iPhone

  2. Tap the Share button (square with up-arrow at the bottom)

  3. Scroll down and tap "Add to Home Screen"

  4. Confirm — SoloStrike icon now lives next to your other apps


  NOTES:

  - Live mining data (hashrate, workers, blocks) is NEVER cached. Only
    the UI shell is cached for fast loading. You always see fresh stats.

  - This is the foundation for the v1.8.0 mobile redesign coming next.


  v1.7.8 — Widget Hotfix (for real this time).


  FIXED: HOME-SCREEN WIDGET (FOR REAL)

  Three actual bugs were keeping the widget broken since v1.5.13:


  1. Widget endpoint URL pointed at "api:3001" — a hostname Umbrel's
  widget loader can't resolve. Umbrel's app_proxy only exposes a single
  backend (APP_HOST/APP_PORT), so reaching the API container directly
  doesn't work. Fixed by routing through the UI container, which already
  has nginx proxying /api/* to api:3001.


  2. The widgets[].items array with jsonPath mappings was missing.
  Without it, Umbrel doesn't know how to extract data from the JSON
  response and falls back to the example forever. Now declared with
  the correct jsonPath mappings for hashrate, workers, best share, and
  share rate.


  3. PROXY_APP_EXTRAS / PROXY_AUTH_WHITELIST env vars in docker-compose
  were a wild goose chase — Umbrel's app-proxy README only documents
  APP_HOST / APP_PORT / PROXY_AUTH_*. Removed.


  Forced version bump to 1.7.8 to make Umbrel re-sync these files into
  the working app directory. Local sed edits to the deployed copy were
  getting wiped on every app restart because Umbrel re-reads from the
  installed manifest, not the live filesystem.


  v1.7.7 — The Burn + Widget Fix.


  NEW: THE BURN

  Power cost integration in The Reckoning modal. Enter your rig's total
  wattage and your $/kWh electricity rate. The Burn computes daily,
  monthly, and yearly power cost; total electricity spent on the way to
  the 50% strike horizon; net profit (or loss) if you strike at that
  horizon; and your break-even electricity rate — the maximum $/kWh at
  which mining still pays for itself when you strike. Inputs persist in
  localStorage so you don't re-enter them every session. PROFITABLE /
  BURNING badge in the section header gives you the answer at a glance.


  FIXED: HOME-SCREEN WIDGET

  The four-stats Umbrel widget was showing dashes because the
  /api/widget/four-stats endpoint declared in umbrel-app.yml was never
  actually implemented in the API. Now serves live data: Pool Hashrate
  with auto-scaled units (TH/s, PH/s, etc.), online worker count, blocks
  found, and best difficulty. Also added PROXY_APP_EXTRAS and
  PROXY_AUTH_WHITELIST to docker-compose so the home-screen widget
  loader can reach the endpoint without auth (it has no session token).


  v1.7.6 — The Vein + Stratum Connection + Header Polish.


  NEW: THE VEIN

  Replaces the old Strike Odds card. Same orbital probability gauge at the
  top, but now fused with a Block Reward hero showing total BTC + fiat
  value + a subsidy/fees breakdown, a live Fast/Mid/Low fee tier strip
  pulled from mempool.space, and a 2x2 stats grid with Expected, Pool
  Share, Daily Chance, and statistical sats-per-day. Tap to open The
  Reckoning — same flow as before. Density quadrupled, no extra cards.


  NEW: STRATUM CONNECTION CARD

  No more "how do I connect a miner?" questions. New always-on card shows
  three port rows (3333 ASIC, 3334 hobby, 4333 SSL) with live port-light
  status dots, copy buttons on every stratum URL, an auto-filled USER row
  showing your_address.workername, and a PASS row with the d=XXXX
  difficulty hint. If your payout address isn't set yet, the card warns
  you instead of crashing.


  NEW: HEADER STRIKES + RETARGET BADGES

  Glance-friendly upgrades to the top bar. STRIKES counter shows your
  total blocks-found inline, with a lightning bolt and amber glow once
  you hit one. RETARGET shows the difficulty adjustment percentage with
  green/red color and a tooltip listing blocks-remaining-to-retarget.
  Both hidden in Minimal Mode. Header now wraps on narrow screens.


  UNDER THE HOOD

  • API exposes Fast/Mid/Low fee tiers from mempool.space recommended
  fees endpoint (fastestFee / halfHourFee / hourFee with economyFee
  fallback). Old single feeRate field still populated for back-compat.

  • localStorage migration silently renames the "odds" card id to "vein"
  in saved layouts. Existing testers don't lose their card order or
  visibility settings on upgrade. Migration is idempotent.

  • DEFAULT_PRESET updated — new installs get Stratum Connection +
  The Vein in their default lineup, alongside the existing Firepower /
  Crew / Network / Share Stats / Top Diggers / Near Strikes / Strikes.

  • Footer version bumped to 1.7.6; package.json files bumped; server.js
  state.version bumped so Pulse broadcasts reflect the running release.


  v1.7.5 — Strikers Roster + UX Polish.


  NEW: SOLOSTRIKE STRIKERS

  Tap the SoloStrike Pulse card to open the Strikers modal — a per-peer
  anonymous breakdown of every operator currently broadcasting on the
  Pulse network. Your install is pinned at the top with a green THIS
  INSTALL badge. All other operators appear as anonymous numbered
  Strikers (STRIKER 01, STRIKER 02, ...) sorted by hashrate descending.
  Each row shows hashrate, worker count, app version, and time since
  last seen. Outlier-filtered peers are hidden by default; an instant
  toggle reveals them with a FILTERED tag and dimmed styling. Same 100%
  SOLO badge and "Pulse is a census, not a pool" tagline as the card.
  No names, no IPs, no identifying information ever exposed — Strikers
  are stable per-broadcast cycle but all identities rotate every 90 days.


  FIXED: STICKY HEADER

  Header cluster (status bar, ticker, latest block strip, top metrics
  strip, sync warning) now stays pinned at the top of the viewport
  while you scroll the dashboard, with backdrop blur restoring the
  cool effect from v1.5.x. Cards scroll behind the header. The pinned
  region was lost during the v1.7.4 card restoration merge.


  FIXED: SETUP SCREEN FLASH

  The "SoloStrike Setup" form briefly flashed on every page load and
  refresh because the UI rendered before the initial /api/state fetch
  completed. State now defaults payoutAddress to null and tracks a
  _loaded flag — the dashboard waits for the first state response,
  shows a "Connecting to pool…" placeholder, and never flashes the
  setup form unless the API actually has no payout address configured.


  FIXED: API CRASH FROM RELAY LIST EDIT

  Adding a new nostr relay without a comma after the previous entry
  caused the API container to crash-loop with "SyntaxError: Unexpected
  string". Cosmetic but very important — anyone editing the relay
  list could brick their install. Comma added on existing relay,
  no functional change.


  UNDER THE HOOD

  • Per-peer breakdown is computed in network-stats.js recomputeAggregates
  alongside the existing aggregates. seenEvents Map already tracked
  per-pubkey hashrate/workers/blocks/version — now exposed via
  state.networkStats.peers[] with filtered + isOwn flags. Outlier
  detection logic unchanged.

  • state.networkStats.ownPubkey added so the UI can reliably identify
  which row is the user's own broadcast (it's a peer like any other —
  we see ourselves echoed back from relays).

  • Footer version bumped to 1.7.5; package.json files bumped; server.js
  state.version bumped so Pulse broadcasts reflect the running release.


  v1.7.4 — Card Restoration + Tor Pulse Integration.


  RESTORED: 12 RICH DASHBOARD CARDS

  Merged the v1.7.0 cards (HashrateChart, WorkerGrid, NetworkStats,
  BitcoinNodePanel, OddsDisplay, LuckGauge, RetargetPanel, ShareStats,
  BestShareLeaderboard, ClosestCallsPanel, BlockFeed, TopFindersPanel,
  RecentBlocksPanel) and the full WorkerDetailModal back on top of the
  v1.7.3 Tor base. Mining never stopped during the rebuild.


  FIXED

  • /api/settings → /api/config in usePool hook (was 404'ing).

  • state.payoutAddress now syncs alongside cfg.payoutAddress on save.

  • DisplayTab METRIC_CATEGORIES iteration crash (array vs object).

  • App() destructure mismatch on lastBlock/setBlockAlert/refreshConfig.

  • Docker healthcheck now passes — added /api/health endpoint.

  • Deleted orphan legacy solostrike.json config file.


  v1.7.3 — Tor Routing for Pulse.


  Pulse broadcasts and subscriptions now route through Umbrel's
  tor_proxy:9050 SOCKS5 proxy when enabled. Hot-swap reconnect on
  toggle, reachability pre-flight test, auto-recovery every 5 min if
  Tor goes degraded. UI banner shows ready / fallback / unreachable /
  checking states. Identity backup/regenerate flow added.


  v1.7.0 — Rich Card UI Era.


  14+ dashboard cards including HashrateChart, WorkerGrid, NetworkStats,
  BitcoinNodePanel, OddsDisplay, LuckGauge, RetargetPanel, ShareStats,
  BestShareLeaderboard, ClosestCallsPanel, BlockFeed, TopFindersPanel,
  RecentBlocksPanel, PulsePanel. WorkerDetailModal with hashrate, best
  diff, work done, miner web UI link, full share event tracking, reject
  reasons, CSV export. Customizable top strip + scrolling ticker with
  metric selection. Drag-to-reorder cards with persistence. Aliases +
  private notes per worker. Onboarding wizard. Webhook system. Minimal
  Mode + visibility toggles + presets.


  v1.6.0 — SoloStrike Network (backend). A new opt-in community counter
  lets your pool see and contribute to a live total of all SoloStrike
  pools running worldwide. Every install that opts in publishes a
  signed, anonymous event to public nostr relays every 5 minutes.
  Payload is tiny: pool hashrate, worker count, app version, total
  blocks found. No BTC address, no IP, no hostname, no location.


  v1.5.13 — Recursive Sharelog Discovery + Gold-Rush Rebrand.


  CRITICAL: share-watcher was only tracking 50 files out of 1,700+ on
  disk. Rewrote file discovery to recursively walk the entire log tree,
  re-scan every 15 seconds for new block-height directories, removed
  the 50-file tracking cap. Plus: gold-rush themed card naming
  (Firepower, The Crew, Strike Odds, Hot Streak, Top Diggers, Near
  Strikes, Gold Strikes, Claim Jumpers, The Goldfields).
