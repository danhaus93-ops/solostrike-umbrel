releaseNotes: >-
  V1.2.3 — Pool Transparency release.


  • New Bitcoin Node panel — Core version, total/inbound/outbound peers, relay
  fee, mempool tx count, mempool size in MB

  • Latest Block hero strip — ticker now highlights the most recent network
  block with height, pool name, time-since, and reward

  • Worker search box — type to instantly filter the Worker Grid by name or
  miner type (handy when you have 10+ rigs)

  • Leaderboard upgraded to table format — now shows hashrate, miner type,
  and live status dot alongside best difficulty

  • Dropped mempool app dependency (falls back to mempool.space public API
  automatically; users with local Mempool app can still override)

  • Backend RPC polling extended to getnetworkinfo + getmempoolinfo
