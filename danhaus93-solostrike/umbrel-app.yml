manifestVersion: 1
id: danhaus93-solostrike
category: bitcoin
name: SoloStrike
version: "1.5.8"
tagline: Zero-fee solo Bitcoin mining pool with airgapped Private Mode
description: >-
  SoloStrike is a self-hosted solo Bitcoin mining pool for Umbrel, powered by
  the battle-tested ckpool-solo engine and wrapped in a real-time Deep Mine
  dashboard.


  Connect your ASICs directly to your own Bitcoin node and keep 100% of every
  block you find — no pool fees, no custody risk, no middleman.


  v1.3.0 introduces Private Mode — toggle one switch and the entire app goes
  airgapped. No mempool.space calls, no price feeds, no outbound traffic of
  any kind. Your mining activity is yours alone.


  Features:

  • 🔒 Private Mode — fully local operation, zero external API calls when enabled

  • Real-time hashrate waveform with 24h history, 7-day trends, axis labels, and peak tracking

  • Closest Calls leaderboard — historical top 10 best-diff shares across your fleet

  • Daily hashrate snapshots — 90 days of avg/peak history

  • Sticky header cluster — pool status, ticker, latest block, sync warnings, ZMQ indicator

  • Automatic miner-type detection (BitAxe Gamma/Supra/Ultra, NerdQaxe++, Antminer S19/S21 variants, Avalon Nano 3S / Avalon Q, Whatsminer, Braiins rentals)

  • Worker search, miner rename aliases, per-worker last-share timestamps

  • Click miner IP to open its web UI in a new tab

  • Worker offline toast notifications — catch outages the moment they happen

  • Bitcoin Core sync warning banner when your node falls behind

  • Bitcoin Node panel — Core version, total/in/out peers, relay fee, mempool size

  • Block probability — daily, weekly, and monthly odds + expected time to block

  • Luck gauge, difficulty retarget countdown, Top Pool Finders leaderboard

  • Latest Block hero strip — most recently mined block, pool, and reward

  • Recent network blocks feed with solo-winner highlighting

  • Block reward, BTC price (7 currencies), and mempool fees under Bitcoin Network

  • Drag-and-drop card reordering — layout persists per-device

  • Mobile-first responsive layout — 1 / 2 / 4 columns based on screen size

  • Leaderboard table — worker, miner type, hashrate, best diff, status

  • CSV export for workers and found blocks

  • Webhooks — POST events to Discord, ntfy.sh, Home Assistant, Telegram bots, etc.

  • Prometheus /metrics endpoint for Grafana, Home Assistant, and custom monitoring

  • Public read-only API — share your pool stats externally

  • Dual stratum ports — 3333 for ASICs, 3334 for hobby miners (BitAxe, NerdQaxe++)

  • ZMQ status indicator — see at a glance whether Bitcoin Core's block broadcasts are reaching the pool

  • Works with any Stratum V1 miner — one-time setup, miners connect automatically


  100% self-custody. Truly zero fees. Your node, your rules, your blocks.
releaseNotes: >-
  v1.5.8 — Webhooks Unblocked + Polish.


  The webhook UI is fully working end-to-end, plus three smaller fixes.


  FIXED:

  • 🔗 WEBHOOKS WORK END-TO-END — the Settings → Webhooks tab can now add, list,
  and delete hooks. The UI was out of sync with the backend in three places; all
  three are fixed. Discord / ntfy / Telegram / Home Assistant integrations
  configured via the UI will now fire on block-found and worker status events as
  expected.

  • 🎨 RESET LAYOUT FULLY RESETS — the Reset Layout button under Settings →
  Display now restores card visibility in addition to card order. Previously any
  cards you had hidden stayed hidden after reset.

  • 📜 SMOOTHER TICKER — the live scrolling ticker no longer blinks or shows a
  blank gap when the snapshot refreshes every 30 seconds.

  • 🩹 SETUP SCREEN SAFETY — fixed a reference error that could have caused a
  white screen if you cleared your payout address without running the onboarding
  wizard again. Harmless for existing installs, but the landmine is gone.


  v1.5.7 — Block Detection + Fee-Aware Prize.



  Your solo mining lottery just got real. When you find a block, SoloStrike now
  celebrates it immediately instead of quietly burying it. And the block prize
  is now computed correctly, including the mempool fee bounty.


  NEW:

  • 🎯 SOLO BLOCK DETECTION — a new log watcher tails ckpool.log every 2
  seconds for block-solve events. When you find a block, the api appends to
  state.blocks, broadcasts a BLOCK_FOUND websocket event to all connected
  clients (triggering the celebration modal), fires any configured webhooks
  (Discord / ntfy / Telegram / Home Assistant), and persists to disk so the
  win survives restarts.

  • 🪙 ACCURATE BLOCK PRIZE — the Latest Block hero strip now shows the real
  total prize (subsidy + mempool fees) instead of just the 3.125 BTC subsidy.
  Pulls aggregate fees from mempool.space every 60 seconds. Typical fee
  pools add 0.05–0.3 BTC per block, worth thousands of dollars.

  • 🛡️ PRIVATE MODE LATEST BLOCK — when mempool.space is unreachable or the
  pool is in Private Mode, the dashboard now falls back to data pulled
  directly from your local Bitcoin Core RPC. Latest Block, height, pool
  identification, and reward continue to display. Zero external calls.


  FIXED:

  • 🎨 QUICK PRESET BUTTONS — the Settings → Display preset buttons (Minimal,
  Default, Everything) now correctly highlight which preset is active. The
  previous version hardcoded Default as always-selected regardless of
  actual card layout.


  HOUSEKEEPING:

  • Synchronized ui/package.json version to match api + umbrel-app manifest.

  • state.latestBlock now exposed to frontend in transformState payload so UI
  can access locally-fetched chain-tip data independently of mempool.space.


  v1.5.6 — Dashboard Reliability Overhaul.


  This release fixes a cluster of long-standing data-flow bugs that silently
  kept several dashboard cards empty. The whole dashboard now lights up with
  real data the moment you open it.


  FIXED:

  • 🔧 WEBSOCKET RECONNECT LOOP — the UI was connecting to the wrong path,
  which meant the "LIVE" status badge stayed stuck on "RECONN" and the UI
  never received live updates. Now connects properly; dashboard refreshes
  in real time every 5 seconds.

  • 🔧 NODE STATUS "DOWN" — the Bitcoin Node card always showed DOWN because
  the api never populated node info. Now pulls real peer counts, inbound /
  outbound split, relay fee, mempool size, and Bitcoin Core version every
  15 seconds.

  • 🔧 SHARE STATS EMPTY — the Share Stats card stayed at zero because the
  internal shares state was never initialized. Now tracks every accepted,
  rejected, and stale share from ckpool.

  • 🔧 HASHRATE GRAPH EMPTY — the pool hashrate graph never drew a line
  because the history array failed silently on first write. Now accumulates
  points every minute and renders 1H / 6H / 24H / 7D views correctly.

  • 🔧 UPTIME BROKEN — the API uptime indicator showed nonsense ("20565d 22h")
  because the UI's fmtUptime helper expected a timestamp but got a duration.
  Now displays correct "2m", "1h 14m", etc.

  • 🔧 SYNC INDICATOR MISSING — the top-bar SYNC badge stayed on a dash
  because sync state was never computed. Now shows verification progress
  and blocks-behind count.

  • 🔧 DIFFICULTY RETARGET CARD EMPTY — the entire card rendered as a ghost
  (just a stray drag handle) because retarget state was never populated.
  Now computes epoch progress, remaining blocks, ETA, and a real-time
  estimated difficulty change percentage based on epoch block timing.

  • 🔧 STABILITY INDICATOR — displays "rock solid / stable / volatile" based
  on the coefficient of variation of recent hashrate samples.


  NEW:

  • ⚡ ZMQ real-time block notifications re-enabled. When Bitcoin Core's ZMQ
  publisher is reachable, the pool learns about new network blocks within
  milliseconds instead of up to 15 seconds late — less stale work, more
  efficient mining.

  • 🎯 Preset-button highlighting in Settings → Display now reflects which
  preset (Minimal / Default / Everything) actually matches your current
  card selection.


  HOUSEKEEPING:

  • Log spam from the snapshots scheduler silenced with a proper null-check
  on the closestCalls array.

  • WebSocket message types normalized (STATE_UPDATE, BLOCK_FOUND, CONFIG).

  • CONFIG broadcast on settings save — pool name and private-mode changes
  propagate to all connected clients without a refresh.

  • API version string in startup log now matches package version.


  v1.5.4 — Live Stratum Port Health.


  NEW:

  • 🚦 LIVE STRATUM PORT HEALTH — the three stratum ports in the footer (3333,
  3334, 4333) are now color-coded based on real-time health checks. Green =
  healthy, amber = degraded, red = down. Background poller runs every 30
  seconds, performing actual TCP + stratum subscribe handshakes (and TLS
  handshake for 4333) to verify each port is accepting connections. Hover
  any port number for detailed status including latency. No more guessing
  whether the pool is accepting connections — you can see it at a glance.


  v1.5.3 — Security Hardening: TLS stratum + architecture consolidation.


  NEW:

  • 🔐 TLS STRATUM on port 4333 — secure, encrypted stratum mining alongside
  the existing plaintext ports. Modern ASICs (Antminer S21, BitAxe Ultra,
  Whatsminer M60/M66) support stratum+ssl:// URLs natively. Point them at
  port 4333 for end-to-end TLS encryption of all share submissions and job
  templates. Plaintext 3333 and 3334 remain available for legacy miners.

  • 🔒 Self-signed TLS certificate auto-generates on first run and persists
  in app-data across restarts. 10-year validity. No manual cert management
  needed.

  • 🏗️ ARCHITECTURE SIMPLIFIED — widget-server merged into the main api
  container. One less container, one less Docker image, cleaner operation.
  umbrelOS widget now served by the api directly at
  /api/widget/four-stats.


  CHANGED:

  • Container count reduced from 5 to 5 (widget-server replaced by stunnel).

  • CI build matrix simplified: 2 images (ui, api) + stunnel, down from 3.

  • New stunnel sidecar service handles TLS termination — distroless-style
  minimal Alpine image, drops to unprivileged user after cert generation.


  SECURITY:

  • Connections over WireGuard, Tailscale, or exposed networks can now use
  port 4333 for encrypted stratum instead of exposing plaintext traffic.

  • The existing plaintext ports remain available for older ASICs and
  hobby miners without TLS support.

  • Self-signed cert is fine for LAN and VPN use; the miners just need to
  accept it once.


  UPGRADE NOTE:

  If your home-screen widget shows blank after update, remove and re-add it
  from the umbrelOS "Edit widgets" screen — umbrelOS will re-register the
  new endpoint.


  CARRIED FORWARD FROM v1.5.2:

  • 🧭 5-step guided onboarding wizard for first-time installers with
  scannable stratum QR codes and auto-detection of first miner connection.


  CARRIED FORWARD FROM v1.5.1:

  • 📱 Progressive Web App support — "Add to Home Screen" for a standalone
  app experience on iOS and Android.

  • 🏷️ Branded coinbase tag "/SoloStrike on Umbrel/" on every block found.


  CARRIED FORWARD FROM v1.5.0:

  • 🖥️ umbrelOS home-screen widget showing Pool Hashrate, Workers, Blocks
  Found, and Best Difficulty. Refreshes every 10 seconds.


  CARRIED FORWARD FROM v1.4.0:

  • Multi-arch Docker images (linux/amd64 + linux/arm64) — runs natively on
  Raspberry Pi, Umbrel Home, and other x86-64 hardware.


  CARRIED FORWARD FROM v1.3.4:

  • Closest Calls card — pool-wide historical leaderboard of the top 10
  highest-difficulty shares ever submitted.

  • Miner IP capture with clickable link to each miner's web UI.


  CARRIED FORWARD FROM v1.3.3:

  • ZMQ status badge in header, dual stratum ports 3333/3334.


  CARRIED FORWARD FROM v1.3.0:

  • 🔒 Private Mode — toggle one switch and the entire app goes airgapped.
  No mempool.space calls, no price feeds, no outbound traffic.
