id: danhaus93-solostrike
category: bitcoin
name: SoloStrike
version: "1.2.1"
tagline: Zero-fee solo Bitcoin mining pool with a Deep Mine dashboard
description: >-
  SoloStrike is a self-hosted solo Bitcoin mining pool for Umbrel, powered by
  the battle-tested ckpool-solo engine and wrapped in a real-time Deep Mine
  dashboard.


  Connect your ASICs directly to your own Bitcoin node and keep 100% of every
  block you find — no pool fees, no custody risk, no middleman.


  Features:

  • Real-time hashrate waveform and per-worker monitoring with live best-share tracking

  • Automatic miner-type detection (BitAxe Gamma/Supra/Ultra, NerdQaxe++, Antminer S19/S21 variants, Avalon Nano 3S / Avalon Q, Whatsminer, Braiins rentals)

  • Per-worker live difficulty display and traffic-light health status (green / amber / red)

  • Block probability calculator with expected-find time and pool network share

  • Luck gauge — cumulative blocks-found vs. statistically expected, with progress-to-next-block bar

  • Difficulty retarget countdown — remaining blocks, ETA, estimated % change

  • Recent network blocks feed with fellow-solo-winner highlighting

  • Share statistics (accepted / rejected / stale / bestshare per worker) with CSV export

  • Found-block feed with mempool.space integration, confetti celebration, and CSV export

  • ZMQ block notifications from Bitcoin Core for instant new-block work updates

  • Smart vardiff: BitAxes to petahash farms on the same port — no config needed

  • Tested with rented hashrate (Braiins Hashpower) and local ASICs side-by-side

  • Works with any Stratum V1 miner: Antminer S19 XP, BitAxe, NerdMiner, NerdQaxe++, Avalon Nano 3S, and more

  • One-time setup — enter your payout address once, miners connect automatically


  100% self-custody. Your node, your rules, your blocks.


  Release Notes:


  V1.2.1 — Production hardening. Client + server BTC address validation. CSV-
  injection defense. WebSocket heartbeat + exponential reconnect backoff. Rate
  limiting on public endpoints. Nginx gzip, security headers, 1h WS timeout.
  Expanded miner detection (BitAxe Gamma/Supra/Ultra, S19j/k Pro, S21 XP,
  Avalon Q, L7/L9). Native Node fetch — node-fetch EOL dep removed. Log-
  rotation-safe watcher. Fail-fast on missing RPC password.


  V1.2.0 — Miner-type auto-detection, per-worker live difficulty, traffic-light
  worker health, luck gauge with progress-to-next-block, difficulty retarget
  countdown, recent network blocks feed with solo-winner highlighting, CSV export
  for workers and found-blocks, fixed WebSocket state sync bug.


  V1.1.0 — ZMQ block notifications, smart vardiff, per-worker best-share
  leaderboard, tested with Braiins Hashpower rentals, mempool app integration.


  V1.0.0 — Initial release
