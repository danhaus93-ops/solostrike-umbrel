releaseNotes: >-
  V1.3.0 — Private Mode + Operator Console release.


  THE HEADLINE:


  🔒 Private Mode — flip one toggle in Settings to cut off ALL outbound API
  calls. No mempool.space, no price feeds. Perfect airgapped operation. Auto-
  detects Umbrel Mempool app if installed and uses it for local data.
  Features requiring external data gracefully hide. The first truly airgapped-
  capable solo pool on Umbrel.


  OPERATOR CONSOLE:


  • Sticky header cluster — Header, ticker, Latest Block strip, and sync warnings
  stay pinned at the top while content scrolls behind with a blur effect

  • Bitcoin Core sync warning banner — red alert when your node is behind so
  you never mine on stale templates unaware

  • Worker offline toasts — amber toast notifications when a miner disconnects,
  with last-share timestamp and miner type

  • Miner rename aliases — rename .S19XP to "Main Rig" etc., saved per-device

  • Last-share timestamp per worker (4s, 2m, 1h format)

  • Webhooks — new /api/webhooks CRUD endpoint, POST block_found /
  worker_offline / worker_online events to any URL (Discord, Telegram, ntfy.sh,
  Home Assistant, custom bots)

  • Prometheus /metrics endpoint for Grafana and Home Assistant integration

  • Daily, weekly, AND monthly block odds in the Block Probability card

  • 24-hour hashrate history with Y-axis labels, grid lines, and peak reference

  • Bitcoin Core sync status exposed in state.sync (ibd, progress, behind count)


  All features are OFF by default and opt-in — upgrading from 1.2.3 changes
  nothing until you flip the Private Mode switch or add your first webhook.
