version: "3.7"

services:
  app_proxy:
    environment:version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: danhaus93-solostrike_ui_1
      APP_PORT: 80

  ckpool:
    image: ghcr.io/getumbrel/docker-ckpool-solo:590fb2a
    restart: unless-stopped
    stop_grace_period: 1m
    command: ["--btcsolo", "--config", "/etc/ckpool/ckpool.conf"]
    ports:
      - "3333:3333"
      - "3334:3334"
    volumes:
      - ${APP_DATA_DIR}/data/ckpool/config:/etc/ckpool
      - ${APP_DATA_DIR}/data/ckpool/logs:/var/log/ckpool
    environment:
      - BITCOIN_RPC_HOST=${APP_BITCOIN_NODE_IP}
      - BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT}
      - BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASS=${APP_BITCOIN_RPC_PASS}
      - BITCOIN_ZMQ_HASHBLOCK=tcp://${APP_BITCOIN_NODE_IP}:${APP_BITCOIN_ZMQ_HASHBLOCK_PORT}
      - POOL_SIGNATURE=SoloStrike on Umbrel/
      - START_DIFFICULTY=10000
      - MIN_DIFFICULTY=1
      - MAX_DIFFICULTY=0
      - BLOCKPOLL=50
      - UPDATE_INTERVAL=20

  api:
    image: ghcr.io/danhaus93-ops/solostrike-api:latest
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      - ckpool
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=5", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ${APP_DATA_DIR}/data/ckpool/logs:/var/log/ckpool:ro
      - ${APP_DATA_DIR}/data/ckpool/config:/etc/ckpool
      - ${APP_DATA_DIR}/data/config:/app/config
    environment:
      - NODE_ENV=production
      - CKPOOL_LOG_DIR=/var/log/ckpool
      - CKPOOL_CONFIG_DIR=/etc/ckpool
      - CONFIG_DIR=/app/config
      - BITCOIN_RPC_HOST=${APP_BITCOIN_NODE_IP}
      - BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT}
      - BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASS=${APP_BITCOIN_RPC_PASS}
      - BITCOIN_ZMQ_HASHBLOCK=tcp://${APP_BITCOIN_NODE_IP}:${APP_BITCOIN_ZMQ_HASHBLOCK_PORT}
      - POOL_SIGNATURE=SoloStrike on Umbrel/
      - START_DIFFICULTY=10000
      - MIN_DIFFICULTY=1
      - MAX_DIFFICULTY=0
      - BLOCKPOLL=50
      - UPDATE_INTERVAL=20
      - STRATUM_PORT=3333
      - STRATUM_PORT_HOBBY=3334

  ui:
    image: ghcr.io/danhaus93-ops/solostrike-ui:latest
    restart: unless-stopped
    depends_on:
      - api

  widget-server:
    image: ghcr.io/danhaus93-ops/solostrike-widget-server:latest
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - SOLOSTRIKE_API_URL=http://api:3001

      APP_HOST: danhaus93-solostrike_ui_1
      APP_PORT: 80

  ckpool:
    image: ghcr.io/getumbrel/docker-ckpool-solo:590fb2a
    restart: unless-stopped
    stop_grace_period: 1m
    command: ["--btcsolo", "--config", "/etc/ckpool/ckpool.conf"]
    ports:
      - "3333:3333"
      - "3334:3334"
    volumes:
      - ${APP_DATA_DIR}/data/ckpool/config:/etc/ckpool
      - ${APP_DATA_DIR}/data/ckpool/logs:/var/log/ckpool
    environment:
      - BITCOIN_RPC_HOST=${APP_BITCOIN_NODE_IP}
      - BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT}
      - BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASS=${APP_BITCOIN_RPC_PASS}
      - BITCOIN_ZMQ_HASHBLOCK=tcp://${APP_BITCOIN_NODE_IP}:${APP_BITCOIN_ZMQ_HASHBLOCK_PORT}
      - POOL_SIGNATURE=SoloStrike on Umbrel/
      - START_DIFFICULTY=10000
      - MIN_DIFFICULTY=1
      - MAX_DIFFICULTY=0
      - BLOCKPOLL=50
      - UPDATE_INTERVAL=20

  api:
    image: ghcr.io/danhaus93-ops/solostrike-api:latest
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
