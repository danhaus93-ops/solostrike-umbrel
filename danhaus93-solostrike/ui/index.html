<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SoloStrike</title>
    <meta name="description" content="Zero-fee solo Bitcoin mining pool with airgapped Private Mode" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#F5A623" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SoloStrike" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Open Graph (link previews) -->
    <meta property="og:title" content="SoloStrike" />
    <meta property="og:description" content="Zero-fee solo Bitcoin mining pool with airgapped Private Mode" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then(function (reg) {
              // Poll for updates every 60s while app is open
              setInterval(function () {
                reg.update().catch(function () {});
              }, 60000);

              // Detect new version installed
              reg.addEventListener('updatefound', function () {
                var installing = reg.installing;
                if (installing) {
                  installing.addEventListener('statechange', function () {
                    if (
                      installing.state === 'installed' &&
                      navigator.serviceWorker.controller
                    ) {
                      // New version waiting — let the app know
                      window.dispatchEvent(new CustomEvent('sw:update-available'));
                    }
                  });
                }
              });
            })
            .catch(function () {
              // SW failed — app still works, just no offline cache
            });
        });

        // No auto-reload on controllerchange — the update banner manually
        // calls window.location.reload() after the user taps it. Auto-reload
        // here would race the banner and never let it render.

      }
    </script>
  </body>
</html>
