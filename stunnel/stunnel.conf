# SoloStrike TLS stratum terminator
# Listens on :4333 with TLS, forwards plaintext stratum to ckpool:3333
# Cert is generated on first run by entrypoint.sh and stored in /certs

pid = /run/stunnel/stunnel.pid
foreground = yes
output = /dev/stdout

# Drop to unprivileged user after binding the port and reading cert
setuid = nobody
setgid = nobody

# Modern TLS only — reject SSLv2/v3, TLS 1.0, TLS 1.1
sslVersionMin = TLSv1.2

[stratum-tls]
accept = 0.0.0.0:4333
connect = ckpool:3333
cert = /certs/stunnel.pem
key = /certs/stunnel.pem

# Session cache improves reconnect latency for long-lived miners
sessionCacheSize = 1000
sessionCacheTimeout = 300
